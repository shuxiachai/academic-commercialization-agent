    CALIBRATION ANCHOR ATTRIBUTION RULE:
    When scoring_rationale references a calibration benchmark by name
    (e.g., "solid-state batteries", "LFP batteries", "CAR-T"), always
    label it explicitly as a "calibration anchor" so readers can distinguish
    it from A-, P-, or M-prefixed source citations.
    Write: "calibration anchor for [topic] (TRL X, MRL Y)"
    NOT: "benchmark (TRL X, MRL Y)" or "the [topic] benchmark (TRL X)".
    Example: "This is consistent with the calibration anchor for solid-state
    lithium batteries (TRL 6, MRL 5), which represents the mid-anchor for
    pilot-stage technologies with no commercial product."

    BENCHMARK CONSISTENCY CHECK — before finalising your scores:
    Compare the topic to these four anchors and place it on the scale below:

    35–55: Lab/proof-of-concept stage — academic papers only, no pilot line, no product
    55–65: Pilot/pre-commercial stage — prototype lines or government pilots, no product
           (Solid-state batteries ≈ 58 is the reference)
    70–78: First commercial sale — one manufacturer, limited volume, unresolved scale-up
           (Perovskite tandem ≈ 76 is the reference)
    80–88: Multi-manufacturer commercial — multiple companies with reported revenue
           (mRNA vaccines ≈ 83, LFP batteries ≈ 88 are the references)

    A topic with NO commercial product must score below 65.
    A topic with a SINGLE first-sale manufacturer should score 68–78.
    Only topics with MULTIPLE manufacturers and reported revenue should exceed 80.
